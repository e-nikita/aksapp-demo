# Create CICD pipeline for multi environment

name: AKS Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release
      - main

env:
  ACR_NAME: myacrtestvik
  IMAGE_NAME: aks-app
  RESOURCE_GROUP: rgAKSapp-vik
  CLUSTER_NAME: myakscluster-vik

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

  deploy-dev:
    name: Deploy to DEV
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy to DEV Namespace
        run: |
          sed -i "s/PLACEHOLDER/${{ needs.build.outputs.image_tag }}/g" k8s/dev/deployment.yml
          kubectl apply -f k8s/dev/

  deploy-staging:
    name: Deploy to STAGING
    if: github.ref == 'refs/heads/release'
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy to STAGING Namespace
        run: |
          sed -i "s/PLACEHOLDER/${{ needs.build.outputs.image_tag }}/g" k8s/stage/deployment.yml
          kubectl apply -f k8s/stage/

  deploy-prod:
    name: Deploy to PROD
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy to PROD Namespace
        run: |
          sed -i "s/PLACEHOLDER/${{ needs.build.outputs.image_tag }}/g" k8s/prod/deployment.yaml
          kubectl apply -f k8s/prod/